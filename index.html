<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0c0f1d;
  --surface: #141827;
  --card: #1b2035;
  --border: #242d47;
  --accent: #4f8ef7;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #5a6a8a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* SCOREBOARD */
#scoreboard {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12,15,29,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px 12px;
}

.sb-inner {
  max-width: 860px;
  margin: 0 auto;
}

.sb-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.sb-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin-right: auto;
}

.sb-stat {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 15px;
}

.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sb-lbl { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }
.sb-val { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; }
.sb-val.t { color:var(--text); }
.sb-val.c { color:var(--green); }
.sb-val.w { color:var(--red); }

.progress-bar { height:3px; background:var(--border); border-radius:100px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#7c3aed); border-radius:100px; transition:width 0.4s ease; width:0%; }

/* TABS */
.tabs {
  max-width:860px; margin:20px auto 0; padding:0 20px;
  display:flex; gap:8px; flex-wrap:wrap;
}
.tab {
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.5px;
  padding:6px 14px; border-radius:100px; border:1px solid var(--border);
  background:var(--card); color:var(--muted); cursor:pointer; transition:all .18s;
}
.tab:hover { border-color:var(--accent); color:var(--accent); }
.tab.active { background:rgba(79,142,247,.12); border-color:var(--accent); color:var(--accent); }

/* QUIZ WRAP */
#quizWrap { max-width:860px; margin:0 auto; padding:20px 20px 80px; }

/* CARD */
.q-card {
  background:var(--card); border:1px solid var(--border); border-left:3px solid var(--border);
  border-radius:16px; padding:22px; margin-bottom:12px; transition:border-color .2s;
  animation:up .22s ease both;
}
@keyframes up { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.q-card.ok  { border-left-color:var(--green); }
.q-card.bad { border-left-color:var(--red); }

.q-meta { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.q-num  { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.q-tag  {
  font-size:11px; font-family:'DM Mono',monospace; padding:3px 10px; border-radius:100px;
  background:rgba(79,142,247,.1); color:#7eaaff; border:1px solid rgba(79,142,247,.2);
}
.q-text { font-size:15px; font-weight:500; line-height:1.6; margin-bottom:14px; color:#f1f5f9; }

/* OPTIONS */
.opts { display:flex; flex-direction:column; gap:8px; }
.opt {
  display:flex; align-items:flex-start; gap:11px; padding:10px 14px;
  border:1px solid var(--border); border-radius:10px; cursor:pointer;
  transition:all .15s; background:transparent; user-select:none;
}
.opt:hover:not(.locked) { border-color:rgba(79,142,247,.5); background:rgba(79,142,247,.04); }
.opt.locked { cursor:default; }
.opt-l {
  font-family:'DM Mono',monospace; font-size:12px; min-width:24px; height:24px;
  border:1px solid var(--border); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all .15s; flex-shrink:0;
}
.opt-t { font-size:14px; line-height:1.5; padding-top:2px; }

.opt.chosen-right { border-color:var(--green); background:rgba(34,197,94,.07); }
.opt.chosen-right .opt-l { background:var(--green); border-color:var(--green); color:#fff; }

.opt.chosen-wrong { border-color:var(--red); background:rgba(239,68,68,.07); }
.opt.chosen-wrong .opt-l { background:var(--red); border-color:var(--red); color:#fff; }

.opt.reveal { border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.03); }
.opt.reveal .opt-l { border-color:var(--green); color:var(--green); }

/* FEEDBACK */
.feedback {
  display:none; margin-top:10px; padding:9px 13px; border-radius:10px;
  font-size:13px; font-weight:500; align-items:center; gap:6px;
}
.feedback.show { display:flex; }
.feedback.right { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.feedback.wrong  { background:rgba(239,68,68,.1);  color:var(--red);   border:1px solid rgba(239,68,68,.25); }

/* FINISH */
#finish {
  display:none; max-width:860px; margin:0 auto 24px; padding:0 20px;
}
.fin-box {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:48px 32px; text-align:center;
}
.fin-pct { font-family:'Syne',sans-serif; font-size:80px; font-weight:800; line-height:1; }
.fin-msg { color:var(--muted); margin:8px 0 28px; font-size:15px; }
.fin-grid { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:32px; }
.fstat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 28px; min-width:100px; }
.fstat .v { font-family:'Syne',sans-serif; font-size:34px; font-weight:800; margin-bottom:2px; }
.fstat .l { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
.retry-btn {
  background:var(--accent); border:none; color:#fff;
  font-family:'Syne',sans-serif; font-weight:700; font-size:15px;
  padding:13px 36px; border-radius:100px; cursor:pointer; transition:all .2s;
}
.retry-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(79,142,247,.35); }
</style>
</head>
<body>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <div class="sb-inner">
    <div class="sb-row">
      <div class="sb-title">🏥 MIS Quiz</div>

      <div class="sb-stat">

        <span class="sb-val t" id="sbA">0</span>
        <span class="sb-lbl">/ 128</span>
      </div>

      <div class="sb-stat">

        <span class="sb-val c" id="sbC">0</span>
      </div>

    </div>
    <div class="progress-bar"><div class="progress-fill" id="sbFill"></div></div>
  </div>

<!-- TABS -->
<div class="tabs" id="tabs">

  <div class="tab" onclick="setFilter('S4',this)">S4: Benefits</div>
  <div class="tab" onclick="setFilter('S5',this)">S5: Architecture</div>
  <div class="tab" onclick="setFilter('CLIPS',this)">CLIPS</div>
  <div class="tab" onclick="setFilter('CASE',this)">Case Studies</div>
</div>

<!-- FINISH BANNER -->
<div id="finish">
  <div class="fin-box">
    <div class="fin-pct" id="finPct">0%</div>
    <div class="fin-msg" id="finMsg"></div>
    <div class="fin-grid">

      <div class="fstat"><div class="v" style="color:var(--red)"   id="finW">0</div><div class="l">Wrong</div></div>
      <div class="fstat"><div class="v" style="color:var(--accent)">128</div><div class="l">Total</div></div>
    </div>
    <button class="retry-btn" onclick="retry()">🔄 Try Again</button>
  </div>
</div>

// STATE
let answers = {};
let correct = 0, wrong = 0, answered = 0;
let filter = 'all';

function updateSB() {
  document.getElementById('sbA').textContent = answered;
  document.getElementById('sbC').textContent = correct;
  document.getElementById('sbW').textContent = wrong;
  document.getElementById('sbFill').style.width = (answered / Q.length * 100) + '%';
  if (answered === Q.length) showFinish();
}

function choose(id, idx) {
  if (answers[id] !== undefined) return;
  answers[id] = idx;
  const q = Q.find(x => x.id === id);
  const ok = idx === q.a;
  if (ok) correct++; else wrong++;
  answered++;

  const card = document.getElementById('c' + id);
  card.classList.add(ok ? 'ok' : 'bad');

  card.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.add('locked');
    if (i === idx && ok)  el.classList.add('chosen-right');
    if (i === idx && !ok) el.classList.add('chosen-wrong');
    if (!ok && i === q.a) el.classList.add('reveal');
  });

  const fb = card.querySelector('.feedback');
  fb.classList.add('show', ok ? 'right' : 'wrong');
  fb.innerHTML = ok
    ? `✅ Correct! — <strong>${L[q.a]}: ${q.o[q.a]}</strong>`
    : `❌ Wrong! Correct answer: <strong>${L[q.a]}: ${q.o[q.a]}</strong>`;

  updateSB();
}

function render() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  const list = filter === 'all' ? Q : Q.filter(x => x.s === filter);

  list.forEach((q, i) => {
    const done = answers[q.id] !== undefined;
    const ch   = answers[q.id];
    const ok   = done && ch === q.a;

    const optsH = q.o.map((o, i) => {
      let cls = 'opt';
      if (done) {
        cls += ' locked';
        if (i === ch && ok)  cls += ' chosen-right';
        if (i === ch && !ok) cls += ' chosen-wrong';
        if (!ok && i === q.a) cls += ' reveal';
      }
      const click = !done ? `onclick="choose(${q.id},${i})"` : '';
      return `<div class="${cls}" ${click}><div class="opt-l">${L[i]}</div><div class="opt-t">${o}</div></div>`;
    }).join('');

    let fbH = '';
    if (done) {
      const fc = ok ? 'feedback show right' : 'feedback show wrong';
      const fm = ok
        ? `✅ Correct! — <strong>${L[q.a]}: ${q.o[q.a]}</strong>`
        : `❌ Wrong! Correct answer: <strong>${L[q.a]}: ${q.o[q.a]}</strong>`;
      fbH = `<div class="${fc}">${fm}</div>`;
    } else {
      fbH = `<div class="feedback"></div>`;
    }

    const cc = done ? (ok ? 'q-card ok' : 'q-card bad') : 'q-card';
    const d = document.createElement('div');
    d.className = cc;
    d.id = 'c' + q.id;
    d.style.animationDelay = Math.min(i * 0.018, 0.3) + 's';
    d.innerHTML = `
      <div class="q-meta"><span class="q-num">Q${q.id}</span><span class="q-tag">${q.t}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${optsH}</div>
      ${fbH}`;
    wrap.appendChild(d);
  });
}

function setFilter(s, el) {
  filter = s;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function showFinish() {
  const pct = Math.round(correct / Q.length * 100);
  document.getElementById('finish').style.display = 'block';
  document.getElementById('finPct').textContent = pct + '%';
  document.getElementById('finC').textContent = correct;
  document.getElementById('finW').textContent = wrong;
  const msgs = [[90,'🏆 Excellent! You nailed it!'],[75,'🎯 Great job! Strong understanding.'],[60,'📚 Good effort. Keep reviewing.'],[0,'💪 Keep going! You can do better.']];
  document.getElementById('finMsg').textContent = msgs.find(([m]) => pct >= m)[1];
  document.getElementById('finish').scrollIntoView({behavior:'smooth',block:'start'});
}

function retry() {
  answers = {}; correct = 0; wrong = 0; answered = 0; filter = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.getElementById('finish').style.display = 'none';
  updateSB(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

updateSB();
render();
</script>
